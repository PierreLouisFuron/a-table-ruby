# A-Table — production deployment.
#
# 1. Create a `.env` file next to this file (see `.env.example`) containing:
#      SECRET_KEY_BASE=<openssl rand -hex 64>
#      POSTGRES_USER=a_table
#      POSTGRES_PASSWORD=<a-strong-password>
# 2. docker compose up -d
#
# The app container creates and migrates the database on startup, so no
# manual `rails db:create`/`db:migrate` is needed.

services:
  # Service name must match `host:` in config/database.yml (production).
  a-table-postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - a_table_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rails:
    image: cybberbobby/a-table:latest
    # To build locally instead of pulling from Docker Hub, comment out the
    # `image:` line above and uncomment the line below.
    # build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"
    ports:
      - '3000:3000'
    volumes:
      # Persist Active Storage uploads (production stores files in public/images).
      - a_table_images:/app/public/images
    depends_on:
      a-table-postgres:
        condition: service_healthy
    command: >
      bash -c "bundle exec rails db:prepare &&
               bundle exec rails server -b 0.0.0.0"

volumes:
  a_table_pgdata:
  a_table_images:
