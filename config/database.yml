default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV["POSTGRES_USER"] %>
  password: <%= ENV["POSTGRES_PASSWORD"] %>

development:
  <<: *default
  host: localhost
  database: a_table_development

test:
  <<: *default
  host: localhost
  database: a_table_test

production:
  <<: *default
  host: a-table-postgres
  database: a_table_production
